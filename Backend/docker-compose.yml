version: '3.9'

services:
  db:
    image: postgres:17-alpine
    container_name: aetherscreen_db
    environment:
      POSTGRES_DB: aetherscreen
      POSTGRES_USER: aetherscreen
      POSTGRES_PASSWORD: aetherscreen123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    container_name: aetherscreen_redis
    command: redis-server --save 60 1
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"

  web:
    build: .
    container_name: aetherscreen_web
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 4
    volumes:
      - .:/app
      - media_volume:/app/media
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
    env_file: .env

  celery_worker:
    build: .
    container_name: aetherscreen_celery
    command: celery -A config worker --loglevel=info
    volumes:
      - .:/app
    depends_on:
      - web
      - redis
    env_file: .env

  nginx:
    image: nginx:alpine
    container_name: aetherscreen_nginx
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf
      - media_volume:/app/media
      - static_volume:/app/staticfiles
    depends_on:
      - web

volumes:
  postgres_data:
  redis_data:
  media_volume:
  static_volume: